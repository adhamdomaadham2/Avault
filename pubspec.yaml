name: vault_app
description: Secure file vault - hide photos, videos & files
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  permission_handler: ^11.1.0
  photo_view: ^0.14.0
  video_player: ^2.8.2
  chewie: ^1.7.4
  flutter_staggered_grid_view: ^0.7.0
  crypto: ^3.0.3
  mime: ^1.0.4
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
